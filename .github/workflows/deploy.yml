name: Deploy Hotel Report to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      
      - name: Verify index.html exists
        run: |
          echo "Files in repo:"
          ls -la
          if [ -f index.html ]; then
            echo "✅ index.html found"
          else
            echo "❌ index.html NOT found"
            exit 1
          fi
          if [ -f data.json ]; then
            echo "✅ data.json found"
          else
            echo "❌ data.json NOT found"
            exit 1
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

